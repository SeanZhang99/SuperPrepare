optimizer:
  name: Adam
  config:
    learning_rate: 1e-3
    betas: [0.9, 0.999]
    eps: 1e-8
    weight_decay: 1e-4
    amsgrad: false

lr_scheduler:
  cosine_annealing_lr_scheduler:
    name: CosineAnnealingLR
    config:
      T_max: 100
      eta_min: 1e-8
      last_epoch: -1
      verbose: false
